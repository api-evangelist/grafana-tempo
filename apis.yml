aid: grafana-tempo
name: Grafana Tempo
description: >-
  Grafana Tempo is an open-source, high-scale distributed tracing backend that
  requires only object storage to operate, making it cost-effective and easy to
  run. It integrates deeply with Grafana, Prometheus, and Loki for seamless
  observability across metrics, logs, and traces.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
