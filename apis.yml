apis:
  - aid: grafana-tempo:tempo-http-api
    name: Grafana Tempo HTTP API
    description: >-
      Grafana Tempo HTTP API for querying traces, searching with TraceQL,
      retrieving tag names and values, and computing metrics summaries from
      distributed trace data.
    humanURL: https://grafana.com/docs/tempo/latest/api_docs/
    tags:
